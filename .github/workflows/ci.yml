name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: fmt / clippy / nextest / schema
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt,clippy
          targets: aarch64-apple-darwin

      # The pre-installed rustup on the macos-15-arm64 runner image (May 2026
      # series) leaves a broken `~/.cargo/bin/cargo` proxy that dispatches to
      # `rustup-init`'s installer parser instead of the active toolchain. Bypass
      # the proxy by prepending the active toolchain's bin directory to PATH;
      # `rustup which cargo` resolves through the working `rustup` binary.
      - name: Pin toolchain bin to PATH
        run: |
          set -euo pipefail
          rustup show
          TOOLCHAIN_BIN="$(dirname "$(rustup which cargo)")"
          echo "Resolved toolchain bin: $TOOLCHAIN_BIN"
          echo "$TOOLCHAIN_BIN" >> "$GITHUB_PATH"

      - name: Diagnose cargo dispatch
        run: |
          set -x
          which cargo
          cargo --version
          rustc --version
          rustfmt --version
          cargo clippy --version || cargo-clippy --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-1.95

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@latest

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo nextest run --workspace
        run: cargo nextest run --workspace --no-fail-fast

      - name: xtask check-schema
        run: cargo run -p xtask -- check-schema
